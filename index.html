<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-soft: rgba(201,168,76,0.12);
    --text: #e8e8e8;
    --muted: #888;
    --b1: #3a7bd5; /* Базові */
    --b2: #e85d4a; /* WOW */
    --b3: #7c4dce; /* Психологія */
    --b4: #2db87a; /* Отримувачі */
    --b5: #e8a23a; /* Тренди */
    --b6: #00c4b3; /* Вставка */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header { border-bottom: 1px solid var(--border); padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .count-badge { background: var(--gold-soft); border: 1px solid var(--gold); color: var(--gold); padding: 6px 14px; border-radius: 20px; font-size: 13px; }

  /* Stars */
  .stars { display: flex; gap: 4px; padding: 0 20px 14px; align-items: center; }
  .star { font-size: 20px; cursor: pointer; color: #333; transition: color .15s, transform .1s; line-height: 1; }
  .star:hover, .star.active { color: var(--gold); }
  .star:hover { transform: scale(1.2); }
  .stars-label { font-size: 11px; color: var(--muted); margin-left: 8px; }
  .star-clear { font-size: 11px; color: #444; cursor: pointer; margin-left: 6px; transition: color .15s; }
  .star-clear:hover { color: #e85d4a; }
  .card.rated { border-color: rgba(201,168,76,0.35); }
  .card.rated .card-header { background: rgba(201,168,76,0.04); }

  /* Controls */
  .controls { padding: 24px 40px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .search { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 14px; width: 260px; outline: none; transition: border .2s; }
  .search:focus { border-color: var(--gold); }
  .search::placeholder { color: var(--muted); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--gold); color: var(--text); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
  .expand-all { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .expand-all:hover { border-color: var(--gold); color: var(--text); }

  /* Grid */
  .grid { padding: 32px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border .2s, transform .15s; }
  .card:hover { border-color: #3a3a3a; transform: translateY(-1px); }
  .card.hidden { display: none; }

  .card-header { padding: 18px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; user-select: none; }
  .card-num { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .card-title-wrap { flex: 1; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .card-principle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .chevron { color: var(--muted); font-size: 18px; transition: transform .25s; flex-shrink: 0; margin-top: 2px; }
  .card.open .chevron { transform: rotate(180deg); }

  .card-badges { padding: 0 20px 14px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-audience { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-complexity { }
  .badge-low { background: rgba(45,184,122,0.15); color: #2db87a; }
  .badge-mid { background: rgba(232,162,58,0.15); color: #e8a23a; }
  .badge-high { background: rgba(232,93,74,0.15); color: #e85d4a; }
  .badge-platform { background: rgba(58,123,213,0.15); color: #3a7bd5; }

  /* Body */
  .card-body { display: none; border-top: 1px solid var(--border); }
  .card.open .card-body { display: block; }

  .section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .section-text { font-size: 14px; line-height: 1.6; color: #ccc; }
  .section-text blockquote { border-left: 2px solid var(--gold); padding-left: 12px; color: var(--text); font-style: italic; margin: 6px 0; }
  .section-text ul { padding-left: 18px; }
  .section-text li { margin-bottom: 4px; }

  .product-tag { display: inline-block; background: var(--gold-soft); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); padding: 4px 12px; border-radius: 6px; font-size: 12px; margin-top: 4px; }

  /* Block colors */
  .b1 .card-num { background: rgba(58,123,213,0.2); color: var(--b1); }
  .b2 .card-num { background: rgba(232,93,74,0.2); color: var(--b2); }
  .b3 .card-num { background: rgba(124,77,206,0.2); color: var(--b3); }
  .b4 .card-num { background: rgba(45,184,122,0.2); color: var(--b4); }
  .b4r .card-num { background: rgba(45,184,122,0.2); color: var(--b4); }
  .b5 .card-num { background: rgba(232,162,58,0.2); color: var(--b5); }
  .b6 .card-num { background: rgba(0,196,179,0.2); color: var(--b6); }

  .b1 { border-left: 3px solid var(--b1); }
  .b2 { border-left: 3px solid var(--b2); }
  .b3 { border-left: 3px solid var(--b3); }
  .b4 { border-left: 3px solid var(--b4); }
  .b4r { border-left: 3px solid var(--b4); }
  .b5 { border-left: 3px solid var(--b5); }
  .b6 { border-left: 3px solid var(--b6); }

  /* Section headers */
  .block-header { padding: 32px 40px 12px; display: flex; align-items: center; gap: 14px; }
  .block-header:not(:first-of-type) { padding-top: 20px; }
  .block-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .block-title { font-size: 18px; font-weight: 700; }
  .block-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* No results */
  .no-results { padding: 60px 40px; text-align: center; color: var(--muted); font-size: 15px; display: none; }

  /* Footer */
  .footer { border-top: 1px solid var(--border); padding: 20px 40px; color: var(--muted); font-size: 12px; text-align: center; }

  /* Tab nav */
  .tab-nav { display: flex; gap: 4px; padding: 0 40px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 85px; z-index: 99; }
  .tab-btn { padding: 14px 20px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-section { display: none; }
  .tab-section.active { display: block; }

  /* Hypotheses */
  .hyp-grid { padding: 32px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .hyp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border .2s; }
  .hyp-card:hover { border-color: #3a3a3a; }
  .hyp-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .hyp-title { font-size: 15px; font-weight: 600; }
  .hyp-segment { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .hyp-status { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; cursor: pointer; }
  .status-idea { background: rgba(136,136,136,0.15); color: var(--muted); }
  .status-testing { background: rgba(232,162,58,0.15); color: #e8a23a; }
  .status-confirmed { background: rgba(45,184,122,0.15); color: #2db87a; }
  .status-rejected { background: rgba(232,93,74,0.15); color: #e85d4a; }
  .hyp-body { font-size: 13px; color: #bbb; line-height: 1.6; margin-bottom: 12px; }
  .hyp-products { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .hyp-product { background: var(--gold-soft); border: 1px solid rgba(201,168,76,0.2); color: var(--gold); padding: 2px 8px; border-radius: 6px; font-size: 11px; }
  .hyp-priority { font-size: 11px; color: var(--muted); }
  .hyp-priority span { color: var(--text); }
  .hyp-notes { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .hyp-notes textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px; font-size: 12px; resize: vertical; min-height: 60px; outline: none; font-family: inherit; }
  .hyp-notes textarea:focus { border-color: var(--gold); }
  .hyp-add-btn { margin: 0 40px 32px; background: var(--surface); border: 1px dashed var(--border); color: var(--muted); padding: 14px; border-radius: 12px; font-size: 14px; cursor: pointer; width: calc(100% - 80px); transition: all .2s; }
  .hyp-add-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Products */
  .prod-grid { padding: 32px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .prod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .prod-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .prod-name { font-size: 15px; font-weight: 600; }
  .prod-price { font-size: 14px; color: var(--gold); font-weight: 600; white-space: nowrap; margin-left: 12px; }
  .prod-body { padding: 14px 20px; }
  .prod-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 12px; }
  .prod-label:first-child { margin-top: 0; }
  .prod-text { font-size: 13px; color: #bbb; line-height: 1.5; }
  .prod-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .prod-tag { background: rgba(58,123,213,0.12); color: #3a7bd5; padding: 2px 8px; border-radius: 6px; font-size: 11px; }

  @media (max-width: 600px) {
    .header, .controls, .grid, .block-header { padding-left: 16px; padding-right: 16px; }
    .tab-nav { padding: 0 16px; top: 80px; }
    .hyp-grid, .prod-grid { padding: 16px; grid-template-columns: 1fr; }
    .grid { grid-template-columns: 1fr; }
    .search { width: 100%; }
    .hyp-add-btn { margin: 0 16px 24px; width: calc(100% - 32px); }
  }
</style>
</head>

const statusLabels = { idea: '💡 Гіпотеза', testing: '🧪 Тестуємо', confirmed: '✅ Підтверджено', rejected: '❌ Відхилено' };
const statusCycle = { idea: 'testing', testing: 'confirmed', confirmed: 'rejected', rejected: 'idea' };

function saveHypNotes(id, val) { localStorage.setItem('hyp_notes_' + id, val); }
function getHypNotes(id) { return localStorage.getItem('hyp_notes_' + id) || ''; }
function saveHypStatus(id, val) { localStorage.setItem('hyp_status_' + id, val); }
function getHypStatus(id) { return localStorage.getItem('hyp_status_' + id) || null; }

function cycleStatus(id, el) {
  const h = hypotheses.find(x => x.id === id);
  const cur = getHypStatus(id) || h.status;
  const next = statusCycle[cur];
  saveHypStatus(id, next);
  el.textContent = statusLabels[next];
  el.className = 'hyp-status status-' + next;
}

function renderHypotheses() {
  const grid = document.getElementById('hypGrid');
  grid.innerHTML = hypotheses.map(h => {
    const status = getHypStatus(h.id) || h.status;
    const notes = getHypNotes(h.id);
    const prioColor = { high: '#e85d4a', mid: '#e8a23a', low: '#888' }[h.priority];
    const prioLabel = { high: 'Високий', mid: 'Середній', low: 'Низький' }[h.priority];
    return `<div class="hyp-card">
      <div class="hyp-header">
        <div>
          <div class="hyp-title">${escapeHtml(h.title)}</div>
          <div class="hyp-segment">${escapeHtml(h.segment)}</div>
        </div>
        <div class="hyp-status status-${status}" onclick="cycleStatus('${h.id}', this)">${statusLabels[status]}</div>
      </div>
      <div class="hyp-body">${escapeHtml(h.body)}</div>
      <div class="hyp-products">${h.products.map(p => `<span class="hyp-product">${escapeHtml(p)}</span>`).join('')}</div>
      <div class="hyp-priority">Пріоритет: <span style="color:${prioColor}">${prioLabel}</span></div>
      <div class="hyp-notes">
        <textarea placeholder="Нотатки, результати тестів..." onchange="saveHypNotes('${h.id}', this.value)">${escapeHtml(notes)}</textarea>
      </div>
    </div>`;
  }).join('');
}

// Cache: { conceptId: { voterId: rating, ... } }
let ratingsCache = {};

function getUserRating(id) {
  return ratingsCache[id]?.[voterId] || 0;
}
// Зворотна сумісність для фільтрів
function getRating(id) { return getUserRating(id); }

function getAvgRating(id) {
  const votes = ratingsCache[id] || {};
  const vals = Object.values(votes).filter(v => v > 0);
  if (!vals.length) return { avg: 0, count: 0 };
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  return { avg: Math.round(avg * 10) / 10, count: vals.length };
}

function setRating(id, val) {
  if (val === 0) db.ref('ratings/' + id + '/' + voterId).remove();
  else db.ref('ratings/' + id + '/' + voterId).set(val);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(str) {
  return escapeHtml(str)
    .replace(/^"(.+)"$/gm, '<blockquote>"$1"</blockquote>')
    .replace(/\n·/g, '\n•')
    .replace(/\n/g, '<br>')
    .replace(/•/g, '&bull;');
}

// getRating і setRating визначені вище через Firebase

function buildStars(id) {
  const userR = getUserRating(id);
  const { avg, count } = getAvgRating(id);
  let html = `<div class="stars" id="stars-${id}">`;
  for (let i = 1; i <= 5; i++) {
    html += `<span class="star ${i <= userR ? 'active' : ''}" onclick="rateConcept(${id},${i},event)" title="${i} зір${i===1?'ка':i<5?'ки':'ок'}">★</span>`;
  }
  if (count > 0) {
    const word = count === 1 ? 'голос' : count < 5 ? 'голоси' : 'голосів';
    html += `<span class="stars-label">★ ${avg} · ${count} ${word}</span>`;
  } else {
    html += `<span class="stars-label" style="opacity:.35">не оцінено</span>`;
  }
  if (userR > 0) html += `<span class="star-clear" onclick="rateConcept(${id},0,event)" title="Скинути свій голос">✕</span>`;
  html += `</div>`;
  return html;
}

function rateConcept(id, val, e) {
  e.stopPropagation();
  setRating(id, val);
  const starsEl = document.getElementById('stars-' + id);
  starsEl.outerHTML = buildStars(id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  card.classList.toggle('rated', val > 0);
}

  main.innerHTML = '';
  let total = 0;

  const blockOrder = ['b1','b2','b3','b4','b5','b6'];
  blockOrder.forEach(bKey => {
    const filtered = concepts.filter(c => {
      const matchBlock = filter === 'all' || c.block === bKey && filter === bKey || filter === bKey;
      if (!matchBlock && filter !== 'all') return false;
      if (c.block !== bKey) return false;
      if (search) {
        return c.title.toLowerCase().includes(search) || c.principle.toLowerCase().includes(search) || c.audience.toLowerCase().includes(search) || c.product.toLowerCase().includes(search);
      }
      return true;
    });
    if (filtered.length === 0) return;

    const bInfo = blocks[bKey];
    const headerEl = document.createElement('div');
    headerEl.className = 'block-header';
    headerEl.innerHTML = `<div class="block-dot" style="background:${bInfo.color}"></div><div><div class="block-title">${bInfo.label}</div><div class="block-desc">${bInfo.desc}</div></div>`;
    main.appendChild(headerEl);

    const grid = document.createElement('div');
    grid.className = 'grid';
    filtered.forEach(c => { grid.innerHTML += buildCard(c); total++; });
    main.appendChild(grid);
  });

  document.getElementById('totalCount').textContent = `${total} концепцій`;
  document.getElementById('noResults').style.display = total === 0 ? 'block' : 'none';
}

function toggleCard(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  card.classList.toggle('open');
}

// Filters
let currentFilter = 'all';
let allExpanded = false;
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render(currentFilter, document.getElementById('searchInput').value.toLowerCase());
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  render(currentFilter, e.target.value.toLowerCase());
});

// Expand all
document.getElementById('expandAll').addEventListener('click', () => {
  allExpanded = !allExpanded;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('open', allExpanded));
  document.getElementById('expandAll').textContent = allExpanded ? 'Згорнути всі' : 'Розгорнути всі';
});

// Filter stars only
let starsOnly = false;
document.getElementById('filterStars').addEventListener('click', function() {
  starsOnly = !starsOnly;
  this.style.background = starsOnly ? 'var(--gold)' : '';
  this.style.color = starsOnly ? '#000' : '';
  this.style.borderColor = starsOnly ? 'var(--gold)' : '';
  this.style.fontWeight = starsOnly ? '600' : '';
  document.querySelectorAll('.card').forEach(card => {
    const id = parseInt(card.dataset.id);
    const rated = getRating(id) > 0;
    if (starsOnly && !rated) card.classList.add('hidden');
    else card.classList.remove('hidden');
  });
  // update section headers visibility
  document.querySelectorAll('.grid').forEach(grid => {
    const visible = [...grid.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
    grid.previousElementSibling.style.display = visible ? '' : 'none';
    grid.style.display = visible ? '' : 'none';
  });
});

// Delete unrated
document.getElementById('deleteUnrated').addEventListener('click', function() {
  const unrated = concepts.filter(c => getRating(c.id) === 0);
  if (unrated.length === 0) { alert('Всі концепції вже мають зірки!'); return; }
  const confirmed = confirm(`Видалити ${unrated.length} концепцій без зірок? Це видалить їх з поточної сесії.`);
  if (!confirmed) return;
  unrated.forEach(c => {
    const idx = concepts.findIndex(x => x.id === c.id);
    if (idx !== -1) concepts.splice(idx, 1);
  });
  render(currentFilter, document.getElementById('searchInput').value.toLowerCase());
});

render();
renderHypotheses();

// Tab navigation
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// Real-time Firebase listener — оновлює зірки для всіх підключених
db.ref('ratings').on('value', snapshot => {
  // Нова структура: { conceptId: { voterId: rating } }
  const data = snapshot.val() || {};
  ratingsCache = data;

  document.querySelectorAll('.stars').forEach(el => {
    const id = parseInt(el.id.replace('stars-', ''));
    if (!isNaN(id)) el.outerHTML = buildStars(id);
  });
  concepts.forEach(c => {
    const card = document.querySelector(`.card[data-id="${c.id}"]`);
    if (card) card.classList.toggle('rated', getUserRating(c.id) > 0);
  });
});
</script>
